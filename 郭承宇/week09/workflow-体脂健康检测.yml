    - data:
        code: "\ndef main(gender: str, age: int | float, weight: float, height: float):\n\
          \n    height_m = height / 100\n\n    bmi = weight / (height_m ** 2)\n\n\
          \    if gender == \"男\":\n        body_fat_rate = 1.20 * bmi + 0.23 * age\
          \ - 16.2\n    else:\n        body_fat_rate = 1.20 * bmi + 0.23 * age - 5.4\n\
          \n\n    bmi_result = round(bmi, 2)\n    fat_result = round(body_fat_rate,\
          \ 2)\n\n    return {\n        \"bmi\":bmi_result,\n        \"fat\":fat_result\n\
          \    }\n\n\n"
